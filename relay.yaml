containers:
  - name: app
    dockerfile: Dockerfile

services:
  - name: web
    container: app
    ports:
      - name: http
        port: 3000
        proto: tcp
    health:
      type: http
      path: /health
      timeout: 1
      interval: 0.2
      retries: 20

deploys:
  - name: prod
    services:
      - service: web
        host: basic-app.hostbo.cx
        port: 443
        target: http
