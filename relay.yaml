project: relay-smoke

containers:
  - name: api
    dockerfile: app/Dockerfile
  - name: db
    image: postgres:15-alpine
    env:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay

services:
  - name: api
    container: api
    ports:
      - name: http
        port: 3000
        proto: tcp
    env:
      PORT: "3000"
      DATABASE_URL: postgres://relay:relay@host.docker.internal:5436/relay
    health:
      type: http
      path: /health
      timeout: 1
      interval: 1
      retries: 30
  - name: db
    container: db
    ports:
      - name: pg
        port: 5432
        proto: tcp
    volumes:
      - name: data
        mount: /var/lib/postgresql/data
        type: docker_volume
        provider: local

deploys:
  - name: dev
    services:
      - service: api
        host: localhost
        port: 8080
        target: http
      - service: db
        host: localhost
        port: 5436
        target: pg
        proxy: tcp
