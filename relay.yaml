containers:
  - name: app
    dockerfile: Dockerfile

services:
  - name: web
    container: app
    ports:
      - name: http
        port: 3000
        proto: tcp
    env:
      ENABLE_CRASH: "true"
    health:
      type: http
      path: /health
      timeout: 1
      interval: 0.2
      retries: 20

deploys:
  - name: prod
    services:
      - service: web
        host: basic-app.hostbo.cx
        port: 443
        target: http

  - name: fail-health
    extend: prod
    services:
      - service: web
        host: basic-app-fail.hostbo.cx
        port: 443
        target: http
        health:
          type: http
          path: /__relay_error__
          timeout: 0.5
          interval: 0.1
          retries: 8
